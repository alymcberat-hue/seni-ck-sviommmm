<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seni Çok Seviyorum</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            /* Koyu Kırmızı Romantik Arka Plan */
            background: linear-gradient(135deg, #2b0000 0%, #0a0000 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1; 
            z-index: 2;
        }

        .card {
            perspective: 1000px;
            cursor: pointer;
            width: 100%;
            aspect-ratio: 3 / 4; 
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 1.2s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        /* Kart çevrildiğinde çalışacak animasyon */
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            overflow: hidden;
        }

        /* Ön yüz: Senin tasarladığın kart görseli */
        .card-front {
            transform: rotateY(0deg);
            background-color: #110000;
        }

        /* Arka yüz: Sansürlü/Açık Anı veya Ceza Fotoğrafı */
        .card-back {
            transform: rotateY(180deg);
            background-color: #110000;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            background-color: #110000;
            transform: scale(1);
            transition: filter 0.8s ease, transform 0.8s ease;
        }

        .blurred {
            filter: blur(25px) grayscale(40%);
            transform: scale(1.15); 
        }

        .extra-blurred {
            filter: blur(45px) grayscale(60%) brightness(0.6); 
            transform: scale(1.25); 
        }

        /* Ortadaki Kalp Kartı Özellikleri */
        .center-card .card-inner {
            transform: none !important; 
        }
        .center-card .card-face {
            background: radial-gradient(circle, #800000 0%, #330000 100%);
            border: 2px solid #ff4d4d;
            box-shadow: 0 0 20px rgba(255, 77, 77, 0.6);
            animation: pulse 1.5s infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            z-index: 10;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 10px rgba(255, 77, 77, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 77, 77, 0.9); }
            100% { transform: scale(0.95); box-shadow: 0 0 10px rgba(255, 77, 77, 0.5); }
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.92);
            z-index: 1000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Kırmızı Tema Modal İçeriği */
        .modal-content {
            background: linear-gradient(145deg, #220000, #110000);
            padding: 20px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #ff4d4d;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Final Modalı İçin Özel Genişlik */
        .final-content {
            max-width: 500px !important;
            padding: 30px 20px !important;
            z-index: 1002; 
        }

        /* Daktilo Yazı Alanı */
        .final-note-container {
            font-size: 22px;
            line-height: 1.6;
            color: #ffcccc; 
            font-family: 'Georgia', serif;
            font-style: italic;
            margin: 20px 0;
            text-align: center;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s ease;
        }

        .video-container {
            display: none; 
            width: 100%;
            text-align: center;
        }

        /* EMOJİ YAĞMURU ALANI (En üstte olacak) */
        .heart-rain-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 9999; 
            overflow: hidden;
            display: none;
        }

        .falling-heart {
            position: absolute;
            top: -10vh;
            font-size: 2.5rem;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(115vh) rotate(360deg); opacity: 0; }
        }

        .timer-display {
            font-size: 24px;
            font-weight: bold;
            color: #ffcccc;
            background: rgba(255, 0, 0, 0.2);
            padding: 5px 20px;
            border-radius: 20px;
            border: 2px solid #ff4d4d;
            margin-bottom: 15px;
            display: inline-block;
        }

        .timer-warning {
            color: #ff3333;
            border-color: #ff3333;
            background: rgba(255, 51, 51, 0.3);
            animation: pulse-fast 0.5s infinite;
        }

        @keyframes pulse-fast {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .modal-image-container {
            width: 100%;
            height: 250px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid #4d0000;
        }

        .modal-image {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }


        .modal h3 { margin: 0 0 10px 0; color: #ff9999; font-size: 16px;}
        
        .modal input {
            width: 80%;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #ff4d4d;
            background-color: #1a0000;
            color: white;
            font-size: 16px;
            text-align: center;
        }
        
        .modal input:focus { outline: none; border-color: #ff9999; }

        .modal button {
            padding: 12px 20px;
            background-color: #ff4d4d;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            font-size: 16px;
            transition: 0.3s;
        }
        
        .modal button:hover { background-color: #cc0000; }

        .error-text { color: #ff3333; font-size: 14px; display: none; margin-bottom: 10px; font-weight: bold;}
        .success-text { color: #4CAF50; font-size: 18px; display: none; margin-bottom: 10px; font-weight: bold;}

    </style>
</head>
<body>

    <div id="heartRain" class="heart-rain-container"></div>

    <div class="grid-container" id="grid">
        </div>

    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <div class="timer-display" id="timerDisplay">15</div>
            
            <div class="modal-image-container">
                <img id="modalImg" src="" class="modal-image" alt="Anı">
            </div>
            <h3 id="modalHint">İpucu buraya gelecek</h3>
            <p id="errorMsg" class="error-text">Yanlış parola, tekrar dene!</p>
            <p id="successMsg" class="success-text">Harika! Doğru bildin.</p>
            
            <input type="text" id="passwordInput" placeholder="Parolaşiş lütfeeeen" autocomplete="off">
            <br>
            <div>
                <button id="unlockBtn" onclick="checkPassword()">Kilidi Aç</button>
                <button onclick="closeModal()" style="background-color: #330000; border: 1px solid #ff4d4d;">Geri Dön</button>
            </div>
        </div>
    </div>

    <div id="finalModal" class="modal">
        <div class="modal-content final-content">
            
            <div id="finalNoteContainer" class="final-note-container">
                <span id="typewriterText"></span>
            </div>

            <div id="videoContainer" class="video-container">
                <video id="finalVideo" width="100%" controls style="border-radius: 10px; border: 2px solid #ff4d4d; box-shadow: 0 4px 15px rgba(255,0,0,0.3);">
                    <source src="final.mp4" type="video/mp4">
                    Tarayıcınız video oynatmayı desteklemiyor.
                </video>
                <button onclick="closeFinalModal()" style="background-color: #330000; border: 1px solid #ff4d4d; margin-top: 15px;">Kapat</button>
            </div>
            
        </div>
    </div>

    <script>
        const cezaFotolari = [
            "ceza1.jpg", "ceza2.jpg", "ceza3.jpg", "ceza4.jpg", "ceza5.jpg", "ceza6.jpg", "ceza7.jpg"
        ];

        // "kapakFoto" kısımları, senin tasarladığın görseller. İpucu metinleri güncellendi.
        const kartBilgileri = [
            { id: 0, ipucu: "İpucuşuş: Babiş telefonunda kayıtlı fotoğrafta ne yiyor?", parolalar: ["portakaliş"], gercekFoto: "asil1.jpg", kapakFoto: "kart1.jpg" },
            { id: 1, ipucu: "İpucuşuş: İlk yakınlaştığımız yer?", parolalar: ["metroşiş"], gercekFoto: "asil2.jpg", extraBlur: true, kapakFoto: "kart2.jpg" },
            { id: 2, ipucu: "İpucuşuş: Annemin yaptığı en sevdiğin yemekiş?", parolalar: ["içli köfteşiş"], gercekFoto: "asil3.jpg", extraBlur: true, kapakFoto: "kart3.jpg" },
            { id: 3, ipucu: "İpucuşuş: Teyzemin evinde en sevdiğim şey?", parolalar: ["tuvalette sigaraşiş", "tuvalette sigara", "tuvalette sigara içmek", "tuvalette sigara içmeniş", "tuvalette sigara içmen", "tuvaletiş sigaraşiş"], gercekFoto: "asil4.jpg", kapakFoto: "kart4.jpg" },
            // id: 4 (5. kart) ORTADAKİ KALP
            { id: 5, ipucu: "İpucuşuş: Benim adım ne?", parolalar: ["beroş"], gercekFoto: "asil5.jpg", kapakFoto: "kart5.jpg" },
            { id: 6, ipucu: "İpucuşuş: İlk staja giderken Armada' da bir şey yemiştik sen çok sevinmiştin ne yedik?", parolalar: ["suşiş", "suşişiş"], gercekFoto: "asil6.jpg", kapakFoto: "kart6.jpg" },
            { id: 7, ipucu: "İpucuşuş: Tek olduğum stüdyonun finali ertelendiği gün sabah noluyordu?", parolalar: ["kariş yağış", "kariş", "kariş yağdı", "kariş yağdışış", "kariş yağıyordu", "kariş yağıyorduşuş"], gercekFoto: "asil7.jpg", kapakFoto: "kart7.jpg" },
            { id: 8, ipucu: "İpucuşuş: En sevdiğim fotoğrafı nerede çekilmiştikiş?", parolalar: ["pierde", "pierşişde", "pierdeşiş", "pier", "pieriş", "konakta", "konaktaşiş", "konakiş", "konak"], gercekFoto: "asil8.jpg", extraBlur: true, kapakFoto: "kart8.jpg" }
        ];

        const grid = document.getElementById('grid');
        let currentCardData = null; 
        let countdownTimer = null;
        let timeLeft = 15;

        // Kartları Oluştur
        for(let i = 0; i < 9; i++) {
            const card = document.createElement('div');
            
            if (i === 4) {
                // ORTADAKİ KALP
                card.className = 'card center-card';
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face">❤️‍🔥</div>
                    </div>
                `;
                card.onclick = () => {
                    const cozulmusKartSayisi = document.querySelectorAll('.card.unlocked').length;
                    
                    if (cozulmusKartSayisi < 8) {
                        alert("Bütün parolaları bilmen lazım yanii aşkıkış hihi");
                    } else {
                        openFinalSequence();
                    }
                };
            } else {
                const veri = kartBilgileri.find(k => k.id === i);
                
                // Başlangıçta kartlar ters (flipped) değil, senin tasarladığın görseli (card-front) gösterir.
                card.className = 'card locked'; 
                card.dataset.index = i;
                
                const blurClass = veri.extraBlur ? 'extra-blurred' : 'blurred';
                
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-face card-front">
                            <img src="${veri.kapakFoto}" class="card-image">
                        </div>
                        <div class="card-face card-back">
                            <img src="${veri.gercekFoto}" class="card-image ${blurClass}" id="grid-img-${i}">
                        </div>
                    </div>
                `;
                card.onclick = () => openModal(card, veri);
            }
            grid.appendChild(card);
        }

        const modal = document.getElementById('passwordModal');
        const passwordInput = document.getElementById('passwordInput');
        const modalImg = document.getElementById('modalImg');
        const modalHint = document.getElementById('modalHint');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const timerDisplay = document.getElementById('timerDisplay');
        const unlockBtn = document.getElementById('unlockBtn');

        function openModal(cardElement, veri) {
            // Şifre bilindiyse (unlocked) tekrar modal açılmaz
            if (cardElement.classList.contains('unlocked')) return; 

            currentCardData = veri;
            const blurClass = veri.extraBlur ? 'extra-blurred' : 'blurred';
            
            // Eğer kart daha önce ceza yemişse (arkasında ceza resmi varsa bile), 
            // modal açıldığında o kartın asıl sansürlü fotoğrafını tekrar gösteririz ki çözebilsin.
            modalImg.src = veri.gercekFoto;
            modalHint.innerText = veri.ipucu;
            modalImg.className = `modal-image ${blurClass}`;
            
            passwordInput.value = '';
            passwordInput.style.display = 'inline-block';
            unlockBtn.style.display = 'inline-block';
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            timerDisplay.classList.remove('timer-warning');
            
            modal.style.display = 'flex';
            passwordInput.focus();

            startTimer();
        }

        function startTimer() {
            clearInterval(countdownTimer);
            timeLeft = 15; 
            timerDisplay.innerText = timeLeft;
            timerDisplay.style.display = 'inline-block';

            countdownTimer = setInterval(() => {
                timeLeft--;
                timerDisplay.innerText = timeLeft;

                if(timeLeft <= 3) {
                    timerDisplay.classList.add('timer-warning');
                }

                if(timeLeft <= 0) {
                    clearInterval(countdownTimer);
                    handleTimeOut();
                }
            }, 1000);
        }

        function handleTimeOut() {
            const rastgeleCeza = cezaFotolari[Math.floor(Math.random() * cezaFotolari.length)];

            modalImg.src = rastgeleCeza;
            modalImg.className = `modal-image`; 
            
            // Özelleştirilmiş Ceza Mesajı
            errorMsg.innerText = "Aşkıkış naptııın, tekrar dene :(";
            errorMsg.style.display = 'block';
            
            passwordInput.style.display = 'none';
            unlockBtn.style.display = 'none';
            timerDisplay.style.display = 'none';

            // Kartı çevir (flipped) ve arka yüzdeki img'yi ceza fotoğrafı yap
            const activeCard = document.querySelector(`.card[data-index='${currentCardData.id}']`);
            activeCard.classList.remove('locked');
            activeCard.classList.add('failed', 'flipped'); 
            
            const gridImg = document.getElementById(`grid-img-${currentCardData.id}`);
            gridImg.src = rastgeleCeza;
            gridImg.className = 'card-image'; 
        }

        function checkPassword() {
            if(timeLeft <= 0) return; 

            const guess = passwordInput.value.toLowerCase().trim();
            const isCorrect = currentCardData.parolalar.some(p => p === guess);
            
            if (isCorrect) {
                clearInterval(countdownTimer); 
                
                errorMsg.style.display = 'none';
                successMsg.style.display = 'block';
                modalImg.className = 'modal-image'; 
                
                passwordInput.style.display = 'none';
                unlockBtn.style.display = 'none';
                timerDisplay.style.display = 'none';
                
                // Kartı çevir (flipped ekle) ve asıl fotoğrafı sansürsüz olarak kalıcı göster
                const activeCard = document.querySelector(`.card[data-index='${currentCardData.id}']`);
                activeCard.classList.remove('locked', 'failed');
                activeCard.classList.add('unlocked', 'flipped'); 
                
                const gridImg = document.getElementById(`grid-img-${currentCardData.id}`);
                gridImg.src = currentCardData.gercekFoto;
                gridImg.className = 'card-image';

            } else {
                errorMsg.innerText = "Yanlış parola, tekrar dene!";
                errorMsg.style.display = 'block';
                passwordInput.value = '';
                passwordInput.focus();
            }
        }

        document.getElementById("passwordInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                checkPassword();
            }
        });

        function closeModal() {
            clearInterval(countdownTimer); 
            modal.style.display = 'none';
            // Modal kapandığında kartlar mevcut durumlarında (çevrilmişse çevrilmiş, dönmemişse dönmemiş) kalır.
        }

        /* ---------------- FİNAL EKRANI VİDEO, YAZI VE KALP ANİMASYONLARI ---------------- */
        let heartInterval;
        const finalMessage = "Canım aşkım bitanem. İyiki doğdun, iyiki benim oldun. Seni çok seviyorum. 23. Yaşın sana hayatta sağlık, mutluluk, huzur ve güzellik getirsin. İyiki senoşumsun iyiki bebeğimsin iyiki bebişimsin. Eşekiş ❤️‍🔥❤️‍🔥❤️‍🔥";

        function openFinalSequence() {
            const finalModal = document.getElementById('finalModal');
            const noteContainer = document.getElementById('finalNoteContainer');
            const videoCont = document.getElementById('videoContainer');
            const typeTarget = document.getElementById('typewriterText');
            
            // Ekranları hazırla
            finalModal.style.display = 'flex';
            noteContainer.style.opacity = '1';
            noteContainer.style.display = 'flex';
            videoCont.style.display = 'none';
            typeTarget.innerHTML = '';
            
            // Yazıyı Daktilo gibi yazdır (Hız: 150ms)
            typeWriter(finalMessage, 'typewriterText', 150, () => {
                // Yazı bittikten 6 saniye sonra yavaşça kaybolsun
                setTimeout(() => {
                    noteContainer.style.opacity = '0';
                    
                    // Tamamen kaybolunca videoyu ve kalpleri başlat
                    setTimeout(() => {
                        noteContainer.style.display = 'none';
                        videoCont.style.display = 'block';
                        
                        const vid = document.getElementById('finalVideo');
                        vid.play().catch(e => console.log("Otomatik oynatma tarayıcı tarafından engellendi."));
                        
                        startHeartRain();
                    }, 1500); 
                }, 6000);
            });
        }

        // Harf harf yazdıran fonksiyon
        function typeWriter(text, elementId, speed, callback) {
            let i = 0;
            // Emojilerin bozulmaması için metni karakterlerine ayırıyoruz
            const charArray = Array.from(text);
            const el = document.getElementById(elementId);
            
            function type() {
                if (i < charArray.length) {
                    el.innerHTML += charArray[i];
                    i++;
                    setTimeout(type, speed);
                } else {
                    if (callback) callback(); 
                }
            }
            type();
        }

        // Ekranın yanlarından yanan kalp (❤️‍🔥) yağmuru
        function startHeartRain() {
            const container = document.getElementById('heartRain');
            container.style.display = 'block';
            
            heartInterval = setInterval(() => {
                const heart = document.createElement('div');
                heart.innerText = '❤️‍🔥';
                heart.className = 'falling-heart';
                
                // Kalpleri ekranın sağına (85-100%) veya soluna (0-15%) rastgele yerleştir
                const isLeft = Math.random() > 0.5;
                const leftPos = isLeft ? Math.random() * 15 : 85 + (Math.random() * 15);
                
                heart.style.left = leftPos + 'vw';
                heart.style.animationDuration = (Math.random() * 2 + 3) + 's'; 
                
                container.appendChild(heart);
                
                // Animasyon bitince kalbi DOM'dan temizle
                setTimeout(() => {
                    if(heart.parentNode) heart.parentNode.removeChild(heart);
                }, 5000);
            }, 250); 
        }

        function closeFinalModal() {
            const finalModal = document.getElementById('finalModal');
            const finalVideo = document.getElementById('finalVideo');
            
            clearInterval(heartInterval);
            const container = document.getElementById('heartRain');
            container.style.display = 'none';
            container.innerHTML = ''; 
            
            finalModal.style.display = 'none';
            finalVideo.pause(); 
            finalVideo.currentTime = 0; 
        }
    </script>
</body>
</html>
